project:
  type: website
  output-dir: docs

website:
  title: "序列方舟"
  description: "生物、计算与探索"
  navbar:
    background: "#1B4332"
    search: true
    left:
      - text: "首页"
        href: index.qmd
      - text: "生物科普"
        href: posts.qmd
      - text: "技术笔记"
        menu:
          - text: "Linux"
            href: linux.qmd
          - text: "R 语言"
            href: r-lang.qmd
          - text: "C++"
            href: cpp.qmd
      - text: "关于"
        href: about.qmd
    right:
      - icon: github
        href: https://github.com
        aria-label: GitHub
  page-footer:
    left: |
      (C) 2026 生命科学笔记
    center: |
      探索生命的奥秘 · 记录科学的足迹
    right:
      - icon: github
        href: https://github.com
  sidebar:
    - title: "生物科普"
      style: "docked"
      background: "#F0F7F4"
      contents:
        - posts.qmd
        - section: "分类"
          contents:
            - text: "分子生物学"
              href: "#"
            - text: "进化论"
              href: "#"
            - text: "生态学"
              href: "#"
            - text: "神经科学"
              href: "#"
    - title: "技术笔记"
      style: "docked"
      background: "#F0F7F4"
      contents:
        - text: "Linux 基础"
          href: linux.qmd
        - text: "R 语言数据分析"
          href: r-lang.qmd
        - text: "C++ 编程"
          href: cpp.qmd

format:
  html:
    theme:
      light: [cosmo, styles/bio-theme.scss]
      dark: [darkly, styles/bio-theme.scss]
    css: styles/bio-theme.css
    toc: true
    toc-location: right
    toc-title: "目录"
    code-copy: true
    code-fold: true
    smooth-scroll: true
    fig-responsive: true
    highlight-style: github
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

editor: visual
